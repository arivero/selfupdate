# q_ch16 extension: +20 epochs warm-started (total 40, matching ch8's
# per-item budget). ch16 @20ep failed recall ONLY in the sect family
# (0.67; cont/maieu fine) — q_ch1 taught us budget closes tails before
# capacity walls are declared.
run_name: q_ch16_ext_0p6b_rag
data:
  poem_path: data/quijote/raw_ch16.txt
  examples_path: data/quijote/examples_ch16.jsonl
  corpus_style: prose_quijote
  window: 6
  stride: 3
  full_lines: 6
  context_pad: 2
  section_max_lines: 6
  long_windows: [12]
  part_chunk_lines: 0
  paraphrase: true
  maieutic: true
train:
  method: layerwise
  schedule: summed
  epochs: 20
  init_from: q_ch16_0p6b_rag
  lr: 1.0e-5
  hidden_loss: vocab_mse
  tail_ce_blocks: 8
  tail_ce_weight: 0.5
  anchor_kl_weight: 0.5
  frozen_teacher_copy: true
  lora:
    enabled: false
