# TARGET: best fully-LOCAL arm with the modern kit — lens-CE local heads
# (Belilovsky) on the deep half, vocab_mse, v4, av2 anchors... zero
# cross-block gradients anywhere. The honest forward-only reference for
# the connectivity law (C1's lens_ce_deep hit 0.307 with the OLD kit).
run_name: lw_r_lensdeep2_0p6b_rag
data:
  examples_path: data/poem/examples_v4.jsonl
  paraphrase: true
  long_windows: [24, 48]
  part_chunk_lines: 48
  maieutic: true
train:
  method: layerwise
  schedule: summed
  epochs: 40
  lr: 1.0e-5
  hidden_loss: vocab_mse
  lens_ce_weight: 0.5
  lens_ce_from: 21
  lora:
    enabled: false
