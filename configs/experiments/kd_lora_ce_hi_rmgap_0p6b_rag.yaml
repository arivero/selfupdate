# remove_gap cell of the compaction 2x2 (see MaskConfig comment): same hi
# recipe as the wave-F stub/stub_gap cells, so remove-vs-remove_gap isolates
# the pure RoPE-geometry effect with no stub-token confound.
run_name: kd_lora_ce_hi_rmgap_0p6b_rag
mask:
  compaction: remove_gap
train:
  method: kd
  epochs: 20
  lr: 1.0e-4
  answer_ce_weight: 0.5
  online_teacher: true
  lora:
    enabled: true
