# C2 scale ladder flagship: final recipe at 14B, LoRA r16 online.
# C1 ran 14B tc-LoRA at ~29 GB; reservation 33 GB. "Reservations are not
# leases" — schedule when its lane has real headroom.
run_name: lw_l_final_14b_rag
model:
  name: Qwen/Qwen3-14B
data:
  examples_path: data/poem/examples_v4.jsonl
  paraphrase: true
  long_windows: [24, 48]
  part_chunk_lines: 48
  maieutic: true
train:
  method: layerwise
  schedule: summed
  epochs: 40
  lr: 1.0e-4
  hidden_loss: vocab_mse
  tail_ce_blocks: 8
  tail_ce_weight: 0.5
  anchor_kl_weight: 0.5
  online_teacher: true
  lora:
    enabled: true
