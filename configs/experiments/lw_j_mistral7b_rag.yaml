# Wave J family/scale arm: vocab_mse + tail-CE k=4, LoRA online teacher.
run_name: lw_j_mistral7b_rag
model:
  name: mistralai/Mistral-7B-Instruct-v0.1
data:
  examples_path: data/poem/examples_v2.jsonl
  paraphrase: true
  long_windows: [24, 48]
  part_chunk_lines: 48
train:
  method: layerwise
  schedule: summed
  epochs: 40
  lr: 1.0e-4
  hidden_loss: vocab_mse
  tail_ce_blocks: 4
  tail_ce_weight: 0.5
  online_teacher: true
  lora:
    enabled: true
