# PPP1: single process, all 48 blocks, one H100 (trainer-native vLLM check).
# base_122b_v4_spec.yaml sets v4_stage_scoped=true + v4_teacher_source=store
# for its PPP4/PPP8 overlays; both are explicitly overridden back here since
# v4_stage_scoped forbids v4_teacher_source=online (validate.py) and PPP1
# needs no separate cache-build step at all.
run_name: spec_122b_v4_ppp1_e1
mask:
  compaction: flow_mask
model:
  device: cuda:0
train:
  pipeline_version: 4
  pipeline_revision: "4.0"
  trajectory_source: teacher_hidden
  update_granularity: online
  schedule: summed
  grad_accum: 1
  batching: bucketed
  v4_teacher_source: online
  v4_stage_scoped: false
  v4_stage_splits: []
  v4_stage_devices: []
  v4_stage: -1
eval:
  every_epochs: 100
