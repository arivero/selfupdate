# PPP4 trainer-native, full 2071-item epoch. Stage splits match the proven
# production config (gemma4_31b_v4_ppp4_store.yaml): 60 blocks -> even 15s.
run_name: spec_31b_v4_ppp4_e1
mask:
  compaction: flow_mask
train:
  pipeline_version: 4
  pipeline_revision: "4.0"
  batching: bucketed
  v4_teacher_source: store
  v4_loop_order: layer_major
  v4_stage_scoped: true
  v4_weight_residency: auto
  v4_battery_mode: subprocess
  v4_stage_splits: [15, 30, 45]
  v4_stage_devices: [0, 1, 2, 3]
