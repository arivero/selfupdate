# PPP2 trainer-native vLLM check for 31B (2 stages, ONE node's 2 cards, split
# at the middle cut of the proven PPP4 [15,30,45] -> [30]). Mirrors the proven
# production config (h100_smoke/gemma4_31b_v4_ppp2.yaml) knob-for-knob, single
# epoch instead of its 3-epoch speed-test variant.
run_name: spec_31b_v4_ppp2_e1
mask:
  compaction: flow_mask
cache:
  store_full_teacher_inputs: false
train:
  pipeline_version: 4
  pipeline_revision: "4.6"
  batching: bucketed
  v4_teacher_source: store
  v4_loop_order: layer_major
  v4_relay_every_cohorts: 3
  v4_stage_scoped: true
  v4_weight_residency: rotate
  v4_stage_splits: [30]
  v4_stage_devices: [0, 1]
eval:
  every_epochs: 100
