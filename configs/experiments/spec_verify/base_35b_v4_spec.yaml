# TEMPLATE ONLY — 0.8B is OUT OF SCOPE (owner decision 2026-07-19: discarded
# from the vLLM-reproduction envelope; margin measurement showed the gap is
# real but confined to small-model/long-answer regimes). This file is the
# sed-substitution SOURCE for other models' configs in spec_verify_matrix.sh
# — never run directly. All prior 64-item results from this file were
# DELETED (owner: "2071 is the comparison goal", one whole epoch).
# Trainer-native vLLM-reproduction check (owner 2026-07-19): 0.8B, the 64
# vLLM-answered items, index-only cache (answer ids = the vLLM draft),
# v4_teacher_source=online (hidden states computed by THIS trainer).
# teacher_argmax_acceptance in teacher_output_eval is the goal metric.
run_name: spec_35b_v4_base_never_train
layerwise_project_version: "3.4"
model:
  name: Qwen/Qwen3.6-35B-A3B
  dtype: bfloat16
  device: cuda
  pipeline_split: 0
  pipeline_splits: []
  pipeline_devices: [0]
  pipeline_world_size: 1
data:
  examples_path: data/combined/examples_v5rs_window.jsonl
mask:
  mode: rag_system
  compaction: flow_mask
cache:
  root: caches/spec_35b_v4
  runtime_policy: node_epoch0
  node_root: /dev/shm/$USER/selfupdate-teacher-cache-v4-spec35b
  source_compaction: remove
  hidden_dtype: bfloat16
  store_full_teacher_inputs: false
  full_input_shard_size: 8
  item_cache_items: 16
  generation_batch: 64
  teacher_batch: 64
  generation_budget_bucket: 32
  generation_max_tokens: 4096
  generation_responses_path: runs/vllm_h100/qwen36_35b_a3b/responses_bs256.jsonl
  generation_shuffle_seed: 17
  max_sequence_tokens: 8192
# NOTE: every "64" below (generation_batch/teacher_batch/micro_batch) is a
# BATCHING/COHORT-SIZE knob (items grouped per forward pass for efficiency)
# — completely unrelated to EPOCH SIZE (total dataset items). Epoch size is
# controlled ONLY by data.examples_path, which is the FULL file (2071 items,
# the comparison goal). Do NOT infer or set an item-count limit from these.
train:
  pipeline_version: 4
  pipeline_revision: "4.0"
  expert_routing_source: black_box
  method: layerwise
  run_class: open
  epochs: 1
  max_steps: 0
  seed: 17
  lr: 1.0e-6
  micro_batch: 64
  batching: bucketed
  hidden_loss: huber
  moe_mode: dense_or_black_box
  v4_kv_source: teacher_frozen
  v4_kv_refresh_epochs: 0
  v4_optimizer: immediate_sgd
  v4_loop_order: item_major
  v4_loss_positions: answer
  v4_relay_every_cohorts: 4
  v4_teacher_source: online
  v4_stage_splits: []
  v4_stage_devices: []
  v4_stage: -1
  lora:
    enabled: true
    r: 16
    alpha: 32
    dropout: 0.0
eval:
  every_epochs: 100
  recall_corpora: []
  standard_damage_every_epochs: 0
  standard_damage_limit: 16
  standard_damage_batch_size: 8
  generation_batch: 8
