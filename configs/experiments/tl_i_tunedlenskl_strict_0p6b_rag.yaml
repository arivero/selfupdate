# Tuned-lens strict control: same role as lw_i_lenskl_strict_0p6b_rag,
# but every middle layer is decoded through its frozen calibrated translator.
run_name: tl_i_tunedlenskl_strict_0p6b_rag
data:
  examples_path: data/poem/examples_v2.jsonl
  paraphrase: true
  long_windows: [24, 48]
  part_chunk_lines: 48
train:
  method: layerwise
  schedule: summed
  epochs: 8
  lr: 1.0e-5
  hidden_loss: tuned_lens_kl
  tuned_lens_path: runs/tuned_lens_0.6B/translators.safetensors
  lora:
    enabled: false
