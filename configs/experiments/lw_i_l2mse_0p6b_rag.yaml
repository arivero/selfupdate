# Wave I grid A: hidden-loss sweep at the champion operating point
# (v2 data, summed, tail-CE k=4 w=0.5, 40 epochs, seed 17 = champion's).
run_name: lw_i_l2mse_0p6b_rag
data:
  examples_path: data/poem/examples_v2.jsonl
  paraphrase: true
  long_windows: [24, 48]
  part_chunk_lines: 48
train:
  method: layerwise
  schedule: summed
  epochs: 40
  lr: 1.0e-5
  hidden_loss: l2mse
  tail_ce_blocks: 4
  tail_ce_weight: 0.5
  lora:
    enabled: false
