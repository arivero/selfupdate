# Anchor-diversification test. The v2 destruction battery caught anchor-KL
# teaching to the test: with poetry-only anchors, final_k8 shows poetry
# protected (+0.37) while prose_es/procedural/facts absorb displaced damage
# (+0.63..+0.81) and intrusion runs 22.5%. Same recipe, multi-genre anchors
# (6 poetry + 2 prose_es + 1 prose_en + 2 procedural + 1 facts): does the
# protection generalize, and does intrusion fall?
run_name: lw_m_anchordiv_0p6b_rag
data:
  examples_path: data/poem/examples_v4.jsonl
  paraphrase: true
  long_windows: [24, 48]
  part_chunk_lines: 48
  maieutic: true
train:
  method: layerwise
  schedule: summed
  epochs: 40
  lr: 1.0e-5
  hidden_loss: vocab_mse
  tail_ce_blocks: 8
  tail_ce_weight: 0.5
  anchor_kl_weight: 0.5
  anchor_path: data/anchors_es_v2.txt
  frozen_teacher_copy: true
  lora:
    enabled: false
