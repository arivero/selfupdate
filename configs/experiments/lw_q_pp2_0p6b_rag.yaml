# TARGET: pipeline-parallel repro of the KNOWN-GOOD single-card final_k8
# (CER 0.015 / line_exact 0.986). Any metric drift = a PP bug.
run_name: lw_q_pp2_0p6b_rag
model:
  pipeline_split: 14
data:
  examples_path: data/poem/examples_v4.jsonl
  paraphrase: true
  long_windows: [24, 48]
  part_chunk_lines: 48
  maieutic: true
train:
  method: layerwise
  schedule: summed
  epochs: 40
  lr: 1.0e-5
  hidden_loss: vocab_mse
  tail_ce_blocks: 8
  tail_ce_weight: 0.5
  anchor_kl_weight: 0.5
  frozen_teacher_copy: true
  lora:
    enabled: false
