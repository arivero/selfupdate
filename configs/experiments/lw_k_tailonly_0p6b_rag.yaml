# Two-phase pipeline test (from the chimera finding): body = the strict
# vocab_mse storage run (frozen, init_from), train ONLY the k=4 readout
# window. If this approaches the champion, storage can be trained fully
# block-local/parallel and behavior added in a bounded second phase.
run_name: lw_k_tailonly_0p6b_rag
data:
  examples_path: data/poem/examples_v2.jsonl
  paraphrase: true
  long_windows: [24, 48]
  part_chunk_lines: 48
train:
  method: layerwise
  schedule: tail_only
  init_from: lw_i_vocab_strict_0p6b_rag
  epochs: 40
  lr: 1.0e-5
  hidden_loss: vocab_mse
  tail_ce_blocks: 4
  tail_ce_weight: 0.5
  lora:
    enabled: false
