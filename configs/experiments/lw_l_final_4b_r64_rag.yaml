# LoRA rank test: r16 -> r64 at 4B (av2 anchors, lr 1e-4). Anchors and lr
# both failed to fix the -12..-16pt hellaswag hit; hypothesis = low-rank
# concentration of the update. Rank is the last axis.
run_name: lw_l_final_4b_r64_rag
model:
  name: Qwen/Qwen3-4B
data:
  examples_path: data/poem/examples_v4.jsonl
  paraphrase: true
  long_windows: [24, 48]
  part_chunk_lines: 48
  maieutic: true
train:
  method: layerwise
  schedule: summed
  epochs: 40
  lr: 1.0e-4
  hidden_loss: vocab_mse
  tail_ce_blocks: 8
  tail_ce_weight: 0.5
  anchor_kl_weight: 0.5
  anchor_path: data/anchors_es_v2.txt
  online_teacher: true
  lora:
    r: 64
    alpha: 128
    enabled: true
