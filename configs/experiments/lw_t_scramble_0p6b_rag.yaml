# AUDIT (owner scenario-b): identical recipe/data/CE/budget to slide8pure
# but teacher states LAYER-PERMUTED. If recall collapses toward kd-SFT
# (0.08-0.11), the trajectory channel is causally load-bearing; if recall
# survives, scenario (b) is real. Decisive either way.
run_name: lw_t_scramble_0p6b_rag
data:
  examples_path: data/poem/examples_v4.jsonl
  paraphrase: true
  long_windows: [24, 48]
  part_chunk_lines: 48
  maieutic: true
train:
  method: layerwise
  schedule: summed
  epochs: 40
  lr: 1.0e-5
  hidden_loss: vocab_mse
  conn_window: 8
  conn_stride: 1
  tail_ce_blocks: 8
  tail_ce_weight: 0.5
  tail_hidden_weight: 0.0
  anchor_kl_weight: 0.5
  anchor_path: data/anchors_es_v2.txt
  frozen_teacher_copy: true
  scramble_targets: true
  lora:
    enabled: false
