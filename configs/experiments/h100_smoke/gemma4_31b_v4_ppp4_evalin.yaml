# gemma-4-31B PPP4 EVAL-IN (owner goal 2026-07-19). 60 blocks -> [15,30,45]
# 15-block stages, store lane + scoped. Subprocess battery runs machado/quijote
# recall + standard-damage each epoch; CE/KL validation-loss every boundary.
# 3-epoch. Cache identity matches staged -g31b (29b977c5).
run_name: h100_g31b_v4_ppp4_evalin
mask:
  compaction: flow_mask
cache:
  store_full_teacher_inputs: false
train:
  pipeline_version: 4
  pipeline_revision: "4.6"
  batching: bucketed
  micro_batch: 8
  epochs: 3
  seed: 17
  v4_teacher_source: store
  v4_loop_order: layer_major
  v4_relay_every_cohorts: 3
  v4_stage_scoped: true
  v4_weight_residency: auto
  v4_stage_splits: [15, 30, 45]
  v4_stage_devices: [0, 1, 2, 3]
eval:
  every_epochs: 1
  recall_corpora: [machado, quijote_ch1, quijote_ch4]
  standard_damage_every_epochs: 1
