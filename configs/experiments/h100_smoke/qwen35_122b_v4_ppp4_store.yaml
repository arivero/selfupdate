# Qwen3.5-122B-A10B PPP4 — the scaling-lane entry: stage-scoped loading
# (~63 GB owned/stage of 250 GB total), capture-once store (zero teacher
# forwards after the pre-epoch relay), auto weight residency (expected:
# resident at this size), battery as the pause-and-eval subprocess over all
# four cards. 48 blocks -> even 12-block stages.
run_name: h100_q122b_v4_ppp4_store
mask:
  compaction: flow_mask
cache:
  store_full_teacher_inputs: false
train:
  pipeline_version: 4
  pipeline_revision: "4.6"
  batching: bucketed
  epochs: 3
  v4_teacher_source: store
  v4_loop_order: layer_major
  v4_relay_every_cohorts: 3
  v4_stage_scoped: true
  v4_weight_residency: auto
  v4_stage_splits: [12, 24, 36]
  v4_stage_devices: [0, 1, 2, 3]
eval:
  every_epochs: 100
  standard_damage_every_epochs: 100
