# PROBE of the gate-exemption fix: same as gemma4_26b_v4_ppp4 but 3 epochs
# and a throwaway run_name. Single-stage launch validates that epoch 1
# (capture-heavy) no longer trips the mid-epoch util gate, and measures the
# epoch-2 steady-state util. Not a campaign config.
run_name: h100_g26b_v4_ppp4_probe
mask:
  compaction: flow_mask
cache:
  store_full_teacher_inputs: false
train:
  pipeline_version: 4
  pipeline_revision: "4.0"
  batching: bucketed
  micro_batch: 16
  epochs: 3
  v4_teacher_source: online
  v4_loop_order: item_major
  v4_relay_every_cohorts: 1
  v4_stage_splits: [8, 16, 23]
  v4_stage_devices: [0, 1, 2, 3]
eval:
  every_epochs: 100
  standard_damage_every_epochs: 100
