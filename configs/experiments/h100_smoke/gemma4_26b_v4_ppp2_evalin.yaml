# 26b PPP2 EVAL-IN (owner goal): 2-stage rotate, per-epoch machado+destruction
# +valloss. Subprocess battery single-card (eviction fix frees the card). 3-epoch.
run_name: h100_g26b_v4_ppp2_evalin
mask:
  compaction: flow_mask
cache:
  store_full_teacher_inputs: false
train:
  pipeline_version: 4
  pipeline_revision: "4.0"
  batching: bucketed
  epochs: 3
  seed: 17
  v4_teacher_source: store
  v4_loop_order: layer_major
  v4_relay_every_cohorts: 3
  v4_stage_scoped: true
  v4_weight_residency: rotate
  v4_battery_mode: subprocess
  v4_stage_splits: [16]
  v4_stage_devices: [0, 1]
eval:
  every_epochs: 1
  recall_corpora: [machado, quijote_ch1, quijote_ch4]
  standard_damage_every_epochs: 1
