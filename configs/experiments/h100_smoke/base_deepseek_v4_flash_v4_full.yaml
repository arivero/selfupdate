# Pipeline-v4 DeepSeek-V4-Flash base (2,071 items): 43 blocks, MLA + sparse
# lightning indexer, MoE 256/top-6 (+1 shared), fp8/fp4 on disk. Adapter
# landed 2026-07-18 (9d7aa3c, deepseek_ctx.py); trains from the bf16
# dequant snapshot (scripts/dequantize_snapshot.py output), never the fp8
# hub snapshot (HF fp8 quantizer is is_trainable=False). Cert gate:
# certify_locality_v4 must pass on this model before any campaign run.
run_name: h100_dsv4f_v4_base_never_train
layerwise_project_version: "3.4"
model:
  # HF-format snapshot (convert_deepseek_native_to_hf.py), NODE-LOCAL in shm.
  # PPP8 stages read only their owned layers, so each node stages just its half
  # (agpuh01 layers 0-21, agpuh02 22-42) + the common globals (embed/norm/head/
  # hc_head) into this same shm path — an 8-stage Lustre load would saturate the
  # shared FS (owner: "pandora"). The Lustre source is snapshots/
  # deepseek-v4-flash-hf; fusion order verified bit-exact vs native and against
  # HF's gate=chunk(2)[0] reader.
  name: /dev/shm/arivero/deepseek-v4-flash-hf
  dtype: bfloat16
  device: cuda
  pipeline_split: 0
  pipeline_splits: []
  pipeline_devices: [0]
  pipeline_world_size: 1
data:
  examples_path: data/combined/examples_v5rs_window.jsonl
mask:
  mode: rag_system
  compaction: flow_mask
cache:
  root: caches/h100_dsv4f_v4
  runtime_policy: node_epoch0
  node_root: /dev/shm/$USER/selfupdate-teacher-cache-v4-dsv4f
  source_compaction: remove
  hidden_dtype: bfloat16
  store_full_teacher_inputs: true
  full_input_shard_size: 4
  item_cache_items: 8
  generation_batch: 32
  teacher_batch: 4
  generation_budget_bucket: 32
  generation_max_tokens: 4096
  generation_responses_path: runs/vllm_h100/deepseek_v4_flash/responses_bs256.jsonl
  generation_shuffle_seed: 17
  max_sequence_tokens: 8192
train:
  pipeline_version: 4
  pipeline_revision: "4.0"
  expert_routing_source: black_box
  method: layerwise
  run_class: open
  epochs: 12
  max_steps: 0
  seed: 17
  lr: 1.0e-6
  micro_batch: 32
  batching: bucketed
  hidden_loss: huber
  moe_mode: dense_or_black_box
  v4_kv_source: teacher_frozen
  v4_kv_refresh_epochs: 0
  v4_optimizer: immediate_sgd
  v4_loop_order: layer_major
  v4_loss_positions: answer
  v4_relay_every_cohorts: 4
  v4_teacher_residency: auto
  v4_min_train_gpu_util: 50.0
  v4_stage_splits: []
  v4_stage_devices: []
  v4_stage: -1
  lora:
    enabled: true
    r: 16
    alpha: 32
    dropout: 0.0
eval:
  every_epochs: 4
  recall_corpora: [machado, quijote_ch1, quijote_ch4]
  standard_damage_every_epochs: 4
  standard_damage_limit: 16
  standard_damage_batch_size: 4
  generation_batch: 4
