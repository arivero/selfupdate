# H100 bring-up smoke base: Qwen3-0.6B, pipeline-v3.2, LoRA, one epoch.
#
# Purpose is MECHANICS ONLY: prove this checkout's Python/runtime can train
# on agpuh01 and can place a v3.2 run across N H100s. 100 items is far below
# the 12k-item scientific floor (CLAUDE.md), so no loss curve from this base
# is evidence for anything. Placement overlays live beside this file.
#
# Cache is `durable` under caches/ rather than node_epoch0 /dev/shm: this
# tree has no vLLM generation responses, so build_teacher_cache.py generates
# the teacher answers itself (generation_responses_path stays empty).
run_name: h100_smoke_qwen3_0p6b_base_never_train
layerwise_project_version: "3.4"
model:
  name: Qwen/Qwen3-0.6B
  dtype: bfloat16
  device: cuda
  pipeline_split: 0
  pipeline_splits: []
  pipeline_devices: [0]
  pipeline_world_size: 1
data:
  examples_path: data/combined/examples_v5rs_window_deciepoch100.jsonl
mask:
  mode: rag_system
  compaction: flow_mask
cache:
  root: caches/h100_smoke_0p6b
  # node_epoch0 + `source_compaction: remove` is NOT optional decoration here;
  # it is forced by two rules that meet:
  #   1. pipeline-v3 censorship must be flow_mask/pad_random/intact --
  #      "removal modes are retired" (train/validate.py).
  #   2. build_teacher_cache.py builds its masker WITHOUT keep_privileged, so
  #      it always writes remove-view student metadata (s0/position_gap). A
  #      flow_mask reader sets keep_privileged=True and recomputes s0 != that,
  #      so it can never match a builder-made cache's student metadata.
  # `source_compaction: remove` is the reader's declaration "this cache is
  # another censorship view; its student metadata is not mine" -- it sets
  # cross_view in DistillDataset, which skips the student_match assert while
  # still requiring the teacher-aligned t0/A to match exactly. Without it,
  # training dies with "cache/examples mismatch ...; rebuild the cache".
  # That cross-view build is licensed only via --coordinated-node-cache, which
  # in turn requires runtime_policy: node_epoch0 (direct writes could expose
  # partial safetensor shards to another training arm). Hence /dev/shm.
  runtime_policy: node_epoch0
  node_root: /dev/shm/$USER/selfupdate-teacher-cache-v3-smoke
  source_compaction: remove
  hidden_dtype: bfloat16
  item_cache_items: 16
  generation_batch: 64
  teacher_batch: 64
  generation_budget_bucket: 32
  generation_max_tokens: 4096
  generation_responses_path: ""
  generation_shuffle_seed: 17
  max_sequence_tokens: 8192
train:
  pipeline_version: 3
  pipeline_revision: "3.2"
  pp_execution: serial
  partition_profile_id: ""
  partition_profile_path: ""
  update_granularity: online
  answers_per_update: 0
  tokens_per_answer_update: 0
  update_reduction: ""
  trajectory_source: student_hidden
  attention_source: student_attention
  expert_routing_source: black_box
  method: layerwise
  run_class: open
  schedule: summed
  epochs: 1
  max_steps: 0
  seed: 17
  lr: 1.0e-6
  online_optimizer: immediate_sgd
  online_write_dispatch: after_backward
  stale_gradient_window: 16
  lr_rule: fixed
  backward_dispatch: per_block
  history_policy: causal_bk
  micro_batch: 256
  grad_accum: 1
  batching: bucketed
  activation_shard_users: 32
  prefill_query_chunk: 32
  hidden_loss: huber
  conn_window: 1
  conn_stride: 0
  window_dedup: false
  window_hidden_weight: 1.0
  moe_mode: dense_or_black_box
  offload_adam: false
  lora:
    enabled: true
    r: 16
    alpha: 32
    dropout: 0.0
eval:
  every_epochs: 1
  recall_corpora: [machado, quijote_ch1, quijote_ch4]
  standard_damage_every_epochs: 1
  standard_damage_limit: 16
  standard_damage_batch_size: 8
  generation_batch: 8
