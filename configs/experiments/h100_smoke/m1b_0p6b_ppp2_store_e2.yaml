# M1 leg B — stage-scoped + capture-once store (differs from A: store
# source, layer_major, scoped load, subprocess battery). Expected vs A:
# per-layer epoch losses within bf16 relay-boundary noise (~1e-3), and
# capture_seconds ≈ 0 for epoch 2 (the capture-once lever).
run_name: h100_m1b_0p6b_ppp2_store_e2
mask:
  compaction: flow_mask
cache:
  store_full_teacher_inputs: true
train:
  pipeline_version: 4
  pipeline_revision: "4.0"
  trajectory_source: teacher_hidden
  update_granularity: online
  schedule: summed
  grad_accum: 1
  batching: bucketed
  epochs: 2
  seed: 17
  v4_teacher_source: store
  v4_loop_order: layer_major
  v4_optimizer: immediate_sgd
  v4_teacher_residency: auto
  v4_stage_scoped: true
  v4_battery_mode: subprocess
  v4_weight_residency: resident
  v4_stage_splits: [14]
  v4_stage_devices: [1, 2]
