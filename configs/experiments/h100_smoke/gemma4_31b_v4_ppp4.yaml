# gemma-4-31B-it PPP4 online: 60 blocks -> even 15-block stages. Dense MLP.
# 2026-07-18 02:20 lessons (launch v4-...014810, reaped 01:58):
# - micro_batch 16 still OOMed stage 3 in EPOCH 2 (78.5 GiB peak in sdpa
#   with ~15 GB weights; epoch-2 transient landscape differs from epoch 1)
#   -> 8.
# - auto residency resolves to rebuild here (dense 31B would need
#   ~1.9 TB/stage host store for cpu_stream), so EVERY epoch stays
#   capture-bound near 25% util. Honest physics, not idleness: pin the
#   mid-epoch gate floor at 20 for this config. ~9 min/epoch expected.
run_name: h100_g31b_v4_ppp4
mask:
  compaction: flow_mask
cache:
  store_full_teacher_inputs: false
train:
  pipeline_version: 4
  pipeline_revision: "4.0"
  batching: bucketed
  micro_batch: 8
  v4_min_train_gpu_util: 20.0
  # 50-epoch memorization test (owner, 2026-07-18 02:30): the deliverable
  # is the recall-vs-epoch curve, not uptime. ~9 min/epoch -> ~8 h.
  epochs: 50
  v4_teacher_source: online
  v4_loop_order: item_major
  v4_relay_every_cohorts: 1
  v4_stage_splits: [15, 30, 45]
  v4_stage_devices: [0, 1, 2, 3]
eval:
  every_epochs: 5
  recall_corpora: [machado, quijote_ch1, quijote_ch4]
  standard_damage_every_epochs: 10
