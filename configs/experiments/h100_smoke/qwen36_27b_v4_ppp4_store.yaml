# Qwen3.6-27B PPP4 STORE lane (true best): 64 blocks -> 16-block stages,
# capture-once store + scoped. The default-source PPP4 (198s) was capture-bound
# (1-GPU rotary 214s ≈ 4-GPU 198s = no parallel speedup). 3-epoch speed test.
run_name: h100_q27b_v4_ppp4_store
mask:
  compaction: flow_mask
cache:
  store_full_teacher_inputs: false
train:
  pipeline_version: 4
  pipeline_revision: "4.0"
  batching: bucketed
  micro_batch: 16
  epochs: 3
  seed: 17
  v4_teacher_source: store
  v4_loop_order: layer_major
  v4_relay_every_cohorts: 3
  v4_stage_scoped: true
  v4_weight_residency: auto
  v4_battery_mode: subprocess
  v4_stage_splits: [16, 32, 48]
  v4_stage_devices: [0, 1, 2, 3]
eval:
  every_epochs: 100
  standard_damage_every_epochs: 100
