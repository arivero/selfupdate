# Qwen3.5-397B-A17B PPP4 SINGLE-NODE (agpuh01, GPUs 0-3): 60 blocks -> 15-block
# stages, store+scoped+rotate (rotation mandatory: ~194 GB owned/stage). This is
# BOTH a discriminator (single-node -> files relay, NO NCCL) and a 397B datum.
# 3-epoch SPEED test. Uses the bf16 dequant snapshot.
run_name: h100_q397b_v4_ppp4_store
mask:
  compaction: flow_mask
cache:
  store_full_teacher_inputs: false
train:
  pipeline_version: 4
  pipeline_revision: "4.0"
  batching: bucketed
  micro_batch: 16
  epochs: 3
  seed: 17
  v4_teacher_source: store
  v4_loop_order: layer_major
  v4_relay_every_cohorts: 3
  v4_stage_scoped: true
  v4_weight_residency: rotate
  v4_battery_mode: subprocess
  v4_stage_splits: [15, 30, 45]
  v4_stage_devices: [0, 1, 2, 3]
eval:
  every_epochs: 100
  standard_damage_every_epochs: 100
