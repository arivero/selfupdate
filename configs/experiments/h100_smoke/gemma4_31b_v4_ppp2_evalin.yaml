# gemma-4-31B PPP2 — rotation demo (owner, 2026-07-19). 2 stages, each owns HALF
# the 60 blocks (split = middle of PPP4 [15,30,45] -> [30]), rotate. Dense 31B.
# devices [0,1] (parallel-on-[2,3] hit a cuda:0-default stray-context bug, 2026-07-19). Store
# lane, 3-epoch. Full 31B on this node's shm (~63 GB bf16 -> fits).
run_name: h100_g31b_v4_ppp2_evalin
mask:
  compaction: flow_mask
cache:
  # Match the gemma-31B PPP4 cache (store_full_teacher_inputs: false) that built
  # the staged node_epoch0 cache; the base sets true -> different hash otherwise.
  store_full_teacher_inputs: false
train:
  pipeline_version: 4
  pipeline_revision: "4.0"
  trajectory_source: teacher_hidden
  update_granularity: online
  schedule: summed
  grad_accum: 1
  batching: bucketed
  epochs: 3
  seed: 17
  v4_teacher_source: store
  v4_loop_order: layer_major
  v4_relay_every_cohorts: 3
  v4_stage_scoped: true
  v4_weight_residency: rotate
  v4_battery_mode: subprocess
  v4_stage_splits: [30]
  v4_stage_devices: [0, 1]
eval:
  every_epochs: 1
  recall_corpora: [machado, quijote_ch1, quijote_ch4]
  standard_damage_every_epochs: 1
  recall_corpora: [machado, quijote_ch1, quijote_ch4]
