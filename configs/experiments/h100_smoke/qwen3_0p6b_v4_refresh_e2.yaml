# v4 option-exercise leg: single process, 2 epochs, student-refresh KV
# (rebuild the K/V through the current adapters at every epoch boundary).
run_name: h100_smoke_qwen3_0p6b_v4_refresh_e2
mask:
  compaction: flow_mask
cache:
  store_full_teacher_inputs: true
model:
  device: cuda:1
train:
  pipeline_version: 4
  pipeline_revision: "4.0"
  trajectory_source: teacher_hidden
  update_granularity: online
  schedule: summed
  grad_accum: 1
  batching: bucketed
  epochs: 2
  v4_kv_source: student_refresh
  v4_kv_refresh_epochs: 1
  v4_stage_splits: []
  v4_stage_devices: []
  v4_stage: -1
