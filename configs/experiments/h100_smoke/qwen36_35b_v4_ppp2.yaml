# Qwen3.6-35B-A3B PPP2 — rotation-in-action demo (owner, 2026-07-19). 2 stages,
# each owns HALF the 40 blocks (split = middle of PPP4 [10,20,30] -> [20]),
# v4_weight_residency: rotate pages one owned block per card at a time. MoE 3B
# active. Store lane, 3-epoch. Full 35B on this node's shm (~70 GB bf16 -> fits).
run_name: h100_q35b_v4_ppp2
mask:
  compaction: flow_mask
cache:
  store_full_teacher_inputs: false
train:
  pipeline_version: 4
  pipeline_revision: "4.0"
  batching: bucketed
  epochs: 3
  seed: 17
  v4_teacher_source: store
  v4_loop_order: layer_major
  v4_relay_every_cohorts: 3
  v4_stage_scoped: true
  v4_weight_residency: rotate
  v4_battery_mode: subprocess
  v4_stage_splits: [20]
  v4_stage_devices: [0, 1]
eval:
  every_epochs: 100
  standard_damage_every_epochs: 100
