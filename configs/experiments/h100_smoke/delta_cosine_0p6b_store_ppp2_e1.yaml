# Delta-cosine placement leg: two independent block owners, cut after L14.
# Stage 0 exercises the interior residual objective through L14; stage 1 also
# exercises it and owns final L28's required absolute post-norm fallback.
run_name: h100_admit_delta_cosine_0p6b_store_ppp2_e1
mask:
  compaction: flow_mask
cache:
  store_full_teacher_inputs: true
train:
  pipeline_version: 4
  pipeline_revision: "4.6"
  epochs: 1
  seed: 17
  hidden_loss: delta_cosine
  v4_teacher_source: store
  v4_loop_order: layer_major
  v4_optimizer: immediate_sgd
  v4_capture_micro_batch: 16
  v4_relay_every_cohorts: 0
  v4_teacher_residency: auto
  v4_stage_scoped: true
  v4_weight_residency: auto
  v4_stage_splits: [14]
  v4_stage_devices: [0, 1]
eval:
  every_epochs: 1
  recall_corpora: [machado]
  standard_damage_every_epochs: 0

