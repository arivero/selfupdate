# DeepSeek-V4-Flash PPP8 CROSS-NODE (owner, 2026-07-18): 43 blocks over
# 8 H100s (4+4), MLA + sparse indexer via the B8 frozen-context adapter
# (deepseek_ctx.py). Trains from the bf16 dequant snapshot (base config's
# model.name), store lane + scoped loading. 3-epoch SPEED test. GATE:
# certify_locality_v4 must pass on DeepSeek before this runs (owner B8 law).
run_name: h100_dsv4f_v4_ppp8x
mask:
  compaction: flow_mask
cache:
  store_full_teacher_inputs: false
train:
  pipeline_version: 4
  pipeline_revision: "4.0"
  trajectory_source: teacher_hidden
  update_granularity: online
  schedule: summed
  grad_accum: 1
  batching: bucketed
  micro_batch: 32
  epochs: 3
  seed: 17
  v4_teacher_source: store
  v4_loop_order: layer_major
  v4_relay_every_cohorts: 1
  v4_stage_scoped: true
  v4_weight_residency: auto
  v4_battery_mode: subprocess
  v4_stage_splits: [5, 11, 16, 22, 27, 32, 38]
  v4_stage_devices: [0, 1, 2, 3, 0, 1, 2, 3]
