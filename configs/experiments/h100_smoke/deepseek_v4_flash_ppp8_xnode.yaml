# DeepSeek-V4-Flash PPP8 CROSS-NODE (owner, 2026-07-18): 43 blocks over
# 8 H100s (4+4), MLA + sparse indexer via the B8 frozen-context adapter
# (deepseek_ctx.py). Trains from the bf16 dequant snapshot (base config's
# model.name), store lane + scoped loading. 3-epoch SPEED test. GATE:
# certify_locality_v4 must pass on DeepSeek before this runs (owner B8 law).
run_name: h100_dsv4f_v4_ppp8x
mask:
  compaction: flow_mask
cache:
  store_full_teacher_inputs: false
train:
  pipeline_version: 4
  pipeline_revision: "4.0"
  trajectory_source: teacher_hidden
  update_granularity: online
  schedule: summed
  grad_accum: 1
  batching: bucketed
  # micro_batch 2: DeepSeek's CSA attention uses EAGER (the sparse lightning
  # indexer can't use flash/SDPA), so eager_attention_forward materializes the
  # full [B,heads,q,k] logits at T~5000 PLUS a same-size copy for the `-.max()`
  # softmax stabilization — ~30 GB EACH at B=8, which OOM'd on top of the
  # (pool-capped) resident weights. The logits scale with B, so 2 brings the
  # attention to ~7.5 GB. (32->8->2 across the memory-debug arc; the pool cap in
  # rotation.py fixed the separate buffer-accumulation OOM.)
  micro_batch: 2
  epochs: 3
  seed: 17
  v4_teacher_source: store
  v4_loop_order: layer_major
  # chunk depth 2 (not the default 8): the chunk-layer-outer fill buffers this
  # many cohorts' FrozenDeepseekCtx (sliding K/V + compressed entries + int64
  # top-k over T~5000) on-card before flushing — far heavier per cohort than
  # Qwen's plain K/V, so 8 buffered ctxs OOM'd stage 0. 2 keeps some pipelining.
  v4_fill_chunk_cohorts: 2
  v4_relay_every_cohorts: 3
  v4_stage_scoped: true
  # ROTATE, not auto: DeepSeek layers are ~12 GB each (256 experts) and the MLA
  # store (sliding K/V + compressed entries + indexer top-k) is heavier than
  # Qwen's, so `auto` (which weighs only owned-weight bytes) picks resident and
  # OOMs stage 0's vocab-head card. Rotate keeps one layer on-card at a time.
  v4_weight_residency: rotate
  v4_battery_mode: subprocess
  v4_stage_splits: [5, 11, 16, 22, 27, 32, 38]
  v4_stage_devices: [0, 1, 2, 3, 0, 1, 2, 3]
# Battery OFF for the maiden speed run. The recall battery (Machado + Quijote)
# must NOT reload the model: the subprocess path in v4_battery.py rebuilds the
# student from the snapshot + adapter graft, which (a) is not the student "as
# it is cooked" (rotation/merge-precision drift) and (b) reloads from Lustre,
# forbidden by the weight-residency law. Recall must run as an IN-PIPELINE
# forward through the resident, already-trained sharded stages (LM head on the
# last stage), in the bf16 format the student learned. That eval lane is built
# next; until then this run is a clean 3-epoch speed test.
eval:
  every_epochs: 100
  standard_damage_every_epochs: 100
