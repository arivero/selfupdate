# DeepSeek-V4-Flash PPP8 CROSS-NODE (owner, 2026-07-18): 43 blocks over
# 8 H100s (4+4), MLA + sparse indexer via the B8 frozen-context adapter
# (deepseek_ctx.py). Trains from the bf16 dequant snapshot (base config's
# model.name), store lane + scoped loading. 3-epoch SPEED test. GATE:
# certify_locality_v4 must pass on DeepSeek before this runs (owner B8 law).
run_name: h100_dsv4f_v4_ppp8x
mask:
  compaction: flow_mask
cache:
  store_full_teacher_inputs: false
train:
  pipeline_version: 4
  pipeline_revision: "4.0"
  batching: bucketed
  # micro_batch 1 (2026-07-20, was 2): the 32->8->2 arc below fixed
  # store-fill's no_grad-forward OOMs, but a LATER, DISTINCT crash showed 2
  # is still too large for the TRAINING step's backward pass specifically —
  # stage7 (last stage, layers 39-43 PLUS the resident LM head/final norm,
  # the only stage carrying that fixed extra weight) hit
  # `torch.OutOfMemoryError` inside `summed.backward()` in epoch 0:
  # "Tried to allocate 10.40 GiB ... 7.96 GiB is free ... 70.92 GiB in use"
  # of 79.20 GiB — a ~2.1 GiB deficit (h100_dsv4f_v4_ppp8x_stage7.log,
  # 2026-07-19 05:52 launch). Sibling 5-layer stages (0, 2, 4, 5) never
  # OOMed; only stage7, which uniquely also carries the LM head resident,
  # did — the backward graph (retained activations + grads) is a DIFFERENT,
  # larger memory profile than store-fill's no_grad forward, so the same
  # knob needed a further cut for training specifically. v4_capture_micro_batch
  # below freezes store-fill at the already-proven-safe 2 (see its own
  # comment: "Only affects the no-grad teacher forward, never the training
  # step" — config.py) so this cut costs training throughput only, not the
  # store-fill pass this history already fixed.
  micro_batch: 1
  # DeepSeek's CSA attention uses EAGER (the sparse lightning indexer can't
  # use flash/SDPA), so eager_attention_forward materializes the full
  # [B,heads,q,k] logits at T~5000 PLUS a same-size copy for the `-.max()`
  # softmax stabilization — ~30 GB EACH at B=8, which OOM'd on top of the
  # (pool-capped) resident weights. The logits scale with B, so 2 brings the
  # attention to ~7.5 GB. (32->8->2 across the memory-debug arc; the pool cap
  # in rotation.py fixed the separate buffer-accumulation OOM.) This is the
  # store-fill-only batch size (see micro_batch comment above for why
  # training now uses a smaller, separate value).
  v4_capture_micro_batch: 2
  epochs: 3
  seed: 17
  v4_teacher_source: store
  v4_loop_order: layer_major
  # Utilization gate DISABLED for this run (2026-07-20; was inherited as
  # 50.0 from base_deepseek_v4_flash_v4_full.yaml, uncalibrated for THIS
  # config's own v4_weight_residency: rotate choice below). Stage6 tripped
  # it mid-epoch at 48.9% rolling utilization -- just under the 50% floor --
  # h100_dsv4f_v4_ppp8x_stage6.log, 2026-07-19 05:52 launch:
  # "UTILIZATION GATE (mid-epoch): rolling training-phase GPU utilization
  # 48.9% < 50% floor after 3840 cohort steps". Legitimate weight-paging
  # stalls under rotation dip utilization below a floor calibrated for
  # resident placement; every OTHER rotate-residency config on this branch
  # (the PPP1-rotate family: gemma4_26b/31b, qwen35_122b, qwen36_27b/35b
  # _v4_ppp1_rotate.yaml) already overrides this to 0.0 for the same reason.
  # This config set v4_weight_residency: rotate without also copying that
  # override -- a knob copied without its enabling context (see CLAUDE.md
  # "Corollary 2026-07-17").
  v4_min_train_gpu_util: 0.0
  # chunk depth 2 (not the default 8): the chunk-layer-outer fill buffers this
  # many cohorts' FrozenDeepseekCtx (sliding K/V + compressed entries + int64
  # top-k over T~5000) on-card before flushing — far heavier per cohort than
  # Qwen's plain K/V, so 8 buffered ctxs OOM'd stage 0. 2 keeps some pipelining.
  v4_fill_chunk_cohorts: 2
  v4_relay_every_cohorts: 3
  v4_stage_scoped: true
  # ROTATE, not auto: DeepSeek layers are ~12 GB each (256 experts) and the MLA
  # store (sliding K/V + compressed entries + indexer top-k) is heavier than
  # Qwen's, so `auto` (which weighs only owned-weight bytes) picks resident and
  # OOMs stage 0's vocab-head card. Rotate keeps one layer on-card at a time.
  v4_weight_residency: rotate
  v4_battery_mode: subprocess
  v4_stage_splits: [5, 11, 16, 22, 27, 32, 38]
  v4_stage_devices: [0, 1, 2, 3, 0, 1, 2, 3]
# Battery OFF for the maiden speed run. The recall battery (Machado + Quijote)
# must NOT reload the model: the trainer's subprocess fallback rebuilds the
# student from the snapshot + adapter graft, which (a) is not the student "as
# it is cooked" (rotation/merge-precision drift) and (b) reloads from Lustre,
# forbidden by the weight-residency law. Recall must run as an IN-PIPELINE
# forward through the resident, already-trained sharded stages (LM head on the
# last stage), in the bf16 format the student learned. That eval lane is built
# next; until then this run is a clean 3-epoch speed test.
eval:
  every_epochs: 100
  standard_damage_every_epochs: 100
