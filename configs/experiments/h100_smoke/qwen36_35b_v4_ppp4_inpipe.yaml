# Qwen3.6-35B-A3B PPP4 EVAL-IN (owner goal 2026-07-19). 40 blocks -> even
# 10-block stages, store lane + scoped. Subprocess battery runs machado/quijote
# recall + standard-damage each epoch; CE/KL validation-loss every boundary.
# 3-epoch. Cache identity matches the staged -35b node_epoch0.
run_name: h100_g35b_v4_ppp4_inpipe
mask:
  compaction: flow_mask
cache:
  store_full_teacher_inputs: false
train:
  pipeline_version: 4
  pipeline_revision: "4.0"
  trajectory_source: teacher_hidden
  update_granularity: online
  schedule: summed
  grad_accum: 1
  batching: bucketed
  epochs: 3
  seed: 17
  v4_teacher_source: store
  v4_loop_order: layer_major
  v4_relay_every_cohorts: 3
  v4_stage_scoped: true
  v4_weight_residency: auto
  v4_battery_mode: inpipeline
  v4_stage_splits: [10, 20, 30]
  v4_stage_devices: [0, 1, 2, 3]
eval:
  every_epochs: 1
  recall_corpora: [machado, quijote_ch1, quijote_ch4]
  standard_damage_every_epochs: 1
