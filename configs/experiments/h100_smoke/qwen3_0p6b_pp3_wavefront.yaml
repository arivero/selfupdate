# Leg 2/2: one epoch of pipeline-v3.2 as PP3 across THREE H100s.
# Placement-only overlay on base_qwen3_0p6b_lora.yaml.
#
# Qwen3-0.6B has 28 blocks; cuts [9, 18] give stages 1-9 / 10-18 / 19-28,
# the same 0.6B PP3 cut used by the pareto_v3 lanes probe.
#
# pipeline_devices are PHYSICAL ids consumed by the runtime. Do NOT narrow
# CUDA_VISIBLE_DEVICES for this run: that renumbers the cards to logical
# 0..2 and the runtime correctly rejects the physical mapping (CLAUDE.md,
# multi-node conventions; layerwise34 handoff).
#
# pp_execution: wavefront is gated by validate.py to the preserved v3.2
# protocol (causal_bk + online + stale_gradient_window>0 + grad_accum=1 +
# summed), all inherited from the base. Multi-stage wavefront additionally
# requires a pinned partition_profile_id, which is a provenance label.
run_name: h100_smoke_qwen3_0p6b_pp3_wavefront_e1
model:
  pipeline_split: 0
  pipeline_splits: [9, 18]
  pipeline_devices: [0, 1, 2]
  pipeline_world_size: 3
train:
  pp_execution: wavefront
  partition_profile_id: qwen3-0p6b-pp3-h100-smoke-v1
  partition_profile_path: ""
