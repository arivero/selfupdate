# Qwen3-0.6B PPP2 SINGLE-NODE in-pipeline-recall test (owner Phase-2, #26).
# 2 stages on agpuh01 GPU0+1, v4_battery_mode: inpipeline -> sharded_recall runs
# Machado/Quijote over the RESIDENT cooked student (NO reload) every epoch. This
# is the first exercise of student_decode.sharded_generate/sharded_recall. PASS =
# metrics rows kind=eval phase=inpipeline_recall no_reload=true with per-corpus
# word_acc, no crash, clean finalize. eval every epoch, 2 epochs, split [14].
run_name: h100_q0p6b_v4_ppp2_recall
mask:
  compaction: flow_mask
train:
  pipeline_version: 4
  pipeline_revision: "4.0"
  trajectory_source: teacher_hidden
  update_granularity: online
  schedule: summed
  grad_accum: 1
  batching: bucketed
  epochs: 2
  seed: 17
  v4_teacher_source: store
  v4_loop_order: layer_major
  v4_relay_every_cohorts: 3
  v4_stage_scoped: true
  v4_weight_residency: auto
  v4_battery_mode: inpipeline
  v4_stage_splits: [14]
  v4_stage_devices: [0, 1]
eval:
  every_epochs: 1
  standard_damage_every_epochs: 100
