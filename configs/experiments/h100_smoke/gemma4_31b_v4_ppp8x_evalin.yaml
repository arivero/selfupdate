# gemma-4-31B PPP8 CROSS-NODE EVAL-IN (owner goal 2026-07-19). The target that
# validates the SUBPROCESS BATTERY in cross-node PPP8 (never exercised: prior
# PPP8 runs had eval_every=100 = skipped). 31B's eval subprocess loads ~60 GB
# bf16 on agpuh01's 4 cards (fits) — the clean cross-node battery test before
# 122B/DeepSeek. All 8 stages evict + ack, stage0 spawns the device_map=auto
# eval each epoch, stages resume. 3-epoch. Cache matches staged g31b.
run_name: h100_g31b_v4_ppp8x_evalin
mask:
  compaction: flow_mask
cache:
  store_full_teacher_inputs: false
train:
  pipeline_version: 4
  pipeline_revision: "4.0"
  batching: bucketed
  epochs: 3
  seed: 17
  v4_teacher_source: store
  v4_loop_order: layer_major
  v4_relay_every_cohorts: 3
  v4_stage_scoped: true
  v4_weight_residency: auto
  v4_battery_mode: subprocess
  v4_stage_splits: [7, 15, 22, 30, 37, 45, 52]
  v4_stage_devices: [0, 1, 2, 3, 0, 1, 2, 3]
eval:
  every_epochs: 1
  recall_corpora: [machado, quijote_ch1, quijote_ch4]
  standard_damage_every_epochs: 1
