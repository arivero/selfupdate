# Qwen3.5-122B-A10B PPP8 CROSS-NODE, ADAM variant (owner N-sweep, 2026-07-18):
# identical to qwen35_122b_v4_ppp8_xnode.yaml (8 stages 4+4, store lane,
# scoped, 3-epoch speed test) EXCEPT the optimizer is per-block AdamW instead
# of immediate_sgd. Pairs with the SGD run (h100_q122b_v4_ppp8x, 20.3 s) to
# give the Adam-vs-SGD cell at N=8. Optimizer pinned explicitly (defaults-are-
# experiment-variables law); Adam hypers are torch-AdamW defaults, pinned so
# the config is self-documenting.
run_name: h100_q122b_v4_ppp8x_adam
mask:
  compaction: flow_mask
cache:
  store_full_teacher_inputs: false
train:
  pipeline_version: 4
  pipeline_revision: "4.0"
  trajectory_source: teacher_hidden
  update_granularity: online
  schedule: summed
  grad_accum: 1
  batching: bucketed
  epochs: 3
  seed: 17
  v4_teacher_source: store
  v4_loop_order: layer_major
  v4_relay_every_cohorts: 3
  v4_stage_scoped: true
  v4_weight_residency: auto
  v4_battery_mode: subprocess
  v4_optimizer: adam
  v4_adam_betas: [0.9, 0.999]
  v4_adam_eps: 1.0e-8
  v4_adam_weight_decay: 0.0
  v4_grad_clip: 0.0
  v4_stage_splits: [6, 12, 18, 24, 30, 36, 42]
  v4_stage_devices: [0, 1, 2, 3, 0, 1, 2, 3]
eval:
  every_epochs: 100
  standard_damage_every_epochs: 100
