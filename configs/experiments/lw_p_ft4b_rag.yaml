# TARGET: the TRUE full-FT reference at 4B that C2-16 lacks — LoRA arms are
# destructive (hs -12..-16) and neither anchors nor lr fixed them; this arm
# tests whether full-FT with the C2 default recipe avoids the signature.
# Enabled by offload_adam: resident Adam moments drop from ~32 GB (all
# blocks) to one block's (~1.8 GB); est. peak ~41 GB, reserve 43 GB
# (exclusive-ish lane). epochs 20 for wall-clock (~8h) — recall judged
# with the budget caveat; the destruction profile is the deliverable.
run_name: lw_p_ft4b_rag
model:
  name: Qwen/Qwen3-4B
data:
  examples_path: data/poem/examples_v4.jsonl
  paraphrase: true
  long_windows: [24, 48]
  part_chunk_lines: 48
  maieutic: true
train:
  method: layerwise
  schedule: summed
  epochs: 20
  lr: 1.0e-5
  hidden_loss: vocab_mse
  tail_ce_blocks: 8
  tail_ce_weight: 0.5
  anchor_kl_weight: 0.5
  anchor_path: data/anchors_es_v2.txt
  frozen_teacher_copy: true
  offload_adam: true
  lora:
    enabled: false
