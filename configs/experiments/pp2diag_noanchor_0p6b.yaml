# PP2 BISECTION arm B: full-FT, ANCHORS OFF, PP2. Twin = minus split.
run_name: pp2diag_noanchor_0p6b
model:
  pipeline_split: 14
data:
  examples_path: data/poem/examples_v4.jsonl
  paraphrase: true
  long_windows: [24, 48]
  part_chunk_lines: 48
  maieutic: true
train:
  method: layerwise
  schedule: summed
  epochs: 20
  lr: 1.0e-5
  hidden_loss: vocab_mse
  conn_window: 8
  conn_stride: 1
  tail_ce_blocks: 8
  tail_ce_weight: 0.5
  tail_hidden_weight: 0.0
  anchor_kl_weight: 0.0
  anchor_path: data/anchors_es_v2.txt
  frozen_teacher_copy: true
  lora:
    enabled: false
