# THE RECIPE on prose: crowned slide8pure at Quijote ch8 (hybrid ref: 0.032/15% intr).
run_name: q_ch8_slide8pure_0p6b_rag
data:
  poem_path: data/quijote/raw_ch8.txt
  examples_path: data/quijote/examples_ch8.jsonl
  corpus_style: prose_quijote
train:
  method: layerwise
  schedule: summed
  epochs: 40
  lr: 1.0e-5
  hidden_loss: vocab_mse
  conn_window: 8
  conn_stride: 1
  tail_ce_blocks: 8
  tail_ce_weight: 0.5
  tail_hidden_weight: 0.0
  anchor_kl_weight: 0.5
  anchor_path: data/anchors_es_v2.txt
  frozen_teacher_copy: true
  lora:
    enabled: false
