# New-loss arm (C2 stretch): vocab_fisher = position-dependent Fisher
# metric (teacher lens top-64). Matched to lw_i_vocab (the Wave-I champion
# protocol) — only the hidden loss differs.
run_name: lw_o_fisher_0p6b_rag
data:
  examples_path: data/poem/examples_v2.jsonl
  paraphrase: true
  long_windows: [24, 48]
  part_chunk_lines: 48
train:
  method: layerwise
  schedule: summed
  epochs: 40
  lr: 1.0e-5
  hidden_loss: vocab_fisher
  tail_ce_blocks: 4
  tail_ce_weight: 0.5
  lora:
    enabled: false
