# A / loss-grid baseline: slide-1 is the no-overlap (block-local) control.
# It deliberately changes only connected-credit width from the paired slide-2
# arm.  24 x 513 combined items = 12,312 items, satisfying the minimum
# matched-budget rule before any continuation decision.
run_name: a_lossgrid_1p7b_combined_slide1_vocab
model:
  name: Qwen/Qwen3-1.7B
data:
  examples_path: data/combined/examples_v4_ch1.jsonl
  paraphrase: true
  maieutic: true
  long_windows: [24, 48]
  part_chunk_lines: 48
train:
  method: layerwise
  run_class: method
  schedule: summed
  epochs: 24
  lr: 1.0e-5
  micro_batch: 1
  grad_accum: 8
  batching: item
  hidden_loss: vocab_mse
  conn_window: 1
  conn_stride: 1
  readout_window_blocks: 1
  readout_weight: 0.5
  window_hidden_weight: 1.0
  readout_source: teacher_kl
  anchor_kl_weight: 0.5
  anchor_path: data/anchors_es_v2.txt
  frozen_teacher_copy: true
  lora:
    enabled: false
eval:
  every_epochs: 1
  recall_corpora: [machado, quijote_ch1]
  standard_damage_every_epochs: 1
  standard_damage_limit: 16
  standard_damage_batch_size: 8
