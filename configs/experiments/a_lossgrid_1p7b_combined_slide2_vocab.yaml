# A / loss-grid baseline paired exactly with slide-1 above.
# slide-2 is the only overlapping-window width admitted in this first sweep.
run_name: a_lossgrid_1p7b_combined_slide2_vocab
model:
  name: Qwen/Qwen3-1.7B
data:
  examples_path: data/combined/examples_v4_ch1.jsonl
  paraphrase: true
  maieutic: true
  long_windows: [24, 48]
  part_chunk_lines: 48
train:
  method: layerwise
  run_class: method
  schedule: summed
  epochs: 24
  lr: 1.0e-5
  micro_batch: 1
  grad_accum: 8
  batching: item
  hidden_loss: vocab_mse
  conn_window: 2
  conn_stride: 1
  readout_window_blocks: 2
  readout_weight: 0.5
  window_hidden_weight: 1.0
  readout_source: teacher_kl
  anchor_kl_weight: 0.5
  anchor_path: data/anchors_es_v2.txt
  frozen_teacher_copy: true
  lora:
    enabled: false
eval:
  every_epochs: 1
  recall_corpora: [machado, quijote_ch1]
  standard_damage_every_epochs: 1
  standard_damage_limit: 16
  standard_damage_batch_size: 8
