# REAL AGENDA (owner 2026-07-04): loss comparison UNDER uniform sliding
# windows — is nmse better than vocab_mse as the layerwise loss when
# every block gets uniform 8-deep credit? Depth-uniform, doctrine-clean.
run_name: lw_s_slide8nmse_0p6b_rag
data:
  examples_path: data/poem/examples_v4.jsonl
  paraphrase: true
  long_windows: [24, 48]
  part_chunk_lines: 48
  maieutic: true
train:
  method: layerwise
  schedule: summed
  epochs: 40
  lr: 1.0e-5
  hidden_loss: nmse
  conn_window: 8
  conn_stride: 1
  tail_ce_blocks: 8
  tail_ce_weight: 0.5
  anchor_kl_weight: 0.5
  anchor_path: data/anchors_es_v2.txt
  frozen_teacher_copy: true
  lora:
    enabled: false
