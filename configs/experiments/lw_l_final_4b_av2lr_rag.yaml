# 4B LoRA rerun with multi-genre anchors. The v1-anchor 4B arm hit
# hellaswag -16 pts (vs -7 at 0.6B FT): LoRA r16 @ lr 1e-4 concentrates
# damage. Second axis: halved LoRA lr (5e-5) on top of v2 anchors.
run_name: lw_l_final_4b_av2lr_rag
model:
  name: Qwen/Qwen3-4B
data:
  examples_path: data/poem/examples_v4.jsonl
  paraphrase: true
  long_windows: [24, 48]
  part_chunk_lines: 48
  maieutic: true
train:
  method: layerwise
  schedule: summed
  epochs: 40
  lr: 5.0e-5
  hidden_loss: vocab_mse
  tail_ce_blocks: 8
  tail_ce_weight: 0.5
  anchor_kl_weight: 0.5
  anchor_path: data/anchors_es_v2.txt
  online_teacher: true
  lora:
    enabled: true
