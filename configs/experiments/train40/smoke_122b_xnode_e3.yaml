# Cross-node admission gate for the repaired subprocess-battery transport and
# the exact campaign40 Qwen3.5-122B-A10B PPP8 training shape.  Promote to the
# 40-epoch overlay only after all eight stages complete, every inline locality
# certificate passes, and all epoch-zero/1/2/3 battery artifacts are present.
run_name: campaign40_smoke_q122b_xnode_e3
mask:
  compaction: flow_mask
cache:
  store_full_teacher_inputs: false
train:
  pipeline_version: 4
  pipeline_revision: "4.0"
  batching: bucketed
  micro_batch: 16
  v4_capture_micro_batch: 2
  epochs: 3
  seed: 17
  v4_teacher_source: store
  v4_loop_order: layer_major
  v4_relay_every_cohorts: 3
  v4_stage_scoped: true
  v4_weight_residency: auto
  v4_battery_mode: subprocess
  v4_stage_splits: [6, 12, 18, 24, 30, 36, 42]
  v4_stage_devices: [0, 1, 2, 3, 0, 1, 2, 3]
  v4_optimizer: immediate_sgd
  lr: 3.0e-6
eval:
  every_epochs: 1
  recall_corpora: [machado, quijote_ch1, quijote_ch4]
  standard_damage_every_epochs: 1
