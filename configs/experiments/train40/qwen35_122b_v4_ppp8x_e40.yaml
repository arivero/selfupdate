# Campaign40 primary arm: Qwen3.5-122B-A10B PPP8 CROSS-NODE, 40 epochs.
# Transformation applied from configs/experiments/h100_smoke/
# qwen35_122b_v4_ppp8x_evalin.yaml the same way the single-node e40 configs
# relate to their evalin counterparts: epochs 3->40, eval.every_epochs and
# standard_damage_every_epochs 1->5. Adds lr: 3.0e-6 (the train_sweep
# winning LR). 8 stages over both nodes' H100s (agpuh01 0-3 + agpuh02 0-3);
# proven split [6, 12, 18, 24, 30, 36, 42] / devices
# [0,1,2,3,0,1,2,3]. This is the one model needing both nodes simultaneously
# -- schedule it when neither node is running anything else.
run_name: campaign40_q122b
mask:
  compaction: flow_mask
cache:
  store_full_teacher_inputs: false
train:
  pipeline_version: 4
  pipeline_revision: "4.0"
  batching: bucketed
  # Explicitly pin the measured PPP8 shape.  The base currently defaults to
  # 32/0, which has OOMed the stage-7 backward and is not the campaign recipe.
  micro_batch: 16
  v4_capture_micro_batch: 2
  epochs: 40
  seed: 17
  v4_teacher_source: store
  v4_loop_order: layer_major
  v4_relay_every_cohorts: 3
  v4_stage_scoped: true
  v4_weight_residency: auto
  v4_battery_mode: subprocess
  v4_stage_splits: [6, 12, 18, 24, 30, 36, 42]
  v4_stage_devices: [0, 1, 2, 3, 0, 1, 2, 3]
  v4_optimizer: immediate_sgd
  lr: 3.0e-6
eval:
  every_epochs: 5
  recall_corpora: [machado, quijote_ch1, quijote_ch4]
  standard_damage_every_epochs: 5
