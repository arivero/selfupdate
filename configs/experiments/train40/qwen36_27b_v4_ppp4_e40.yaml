# Campaign40 primary arm: Qwen3.6-27B (dense, 64L x 5120) PPP4, 40 epochs.
# Transformation applied from configs/experiments/h100_smoke/
# qwen36_27b_v4_ppp4_evalin.yaml exactly the way gemma4_26b_v4_ppp4_e40.yaml
# relates to gemma4_26b_v4_ppp4_evalin.yaml: epochs 3->40, eval.every_epochs
# and standard_damage_every_epochs 1->5. Adds lr: 3.0e-6 (the train_sweep
# winning LR, isolated on 26B) with v4_optimizer left at the e40 default
# (immediate_sgd). Proven stage split for 27B: [16, 32, 48] over 4 devices
# (configs/experiments/h100_smoke/qwen36_27b_v4_ppp4_evalin.yaml).
run_name: campaign40_q27b
mask:
  compaction: flow_mask
cache:
  store_full_teacher_inputs: false
train:
  pipeline_version: 4
  pipeline_revision: "4.6"
  batching: bucketed
  micro_batch: 16
  epochs: 40
  seed: 17
  v4_teacher_source: store
  v4_loop_order: layer_major
  v4_relay_every_cohorts: 3
  v4_stage_scoped: true
  v4_weight_residency: auto
  v4_stage_splits: [16, 32, 48]
  v4_stage_devices: [0, 1, 2, 3]
  v4_optimizer: immediate_sgd
  lr: 3.0e-6
eval:
  every_epochs: 5
  recall_corpora: [machado, quijote_ch1, quijote_ch4]
  standard_damage_every_epochs: 5
