# Campaign40 loss screen: block-local residual-increment cosine on
# Gemma-4-26B-A4B PPP4. Launch is gated on the separately implemented v4-local
# delta_cosine objective and its locality/numerics certification; see
# docs/train40_loss_screen.md.
run_name: campaign40_loss_delta_cosine_g26b
mask:
  compaction: flow_mask
cache:
  store_full_teacher_inputs: false
train:
  pipeline_version: 4
  pipeline_revision: "4.6"
  method: layerwise
  run_class: open
  batching: bucketed
  micro_batch: 16
  epochs: 12
  seed: 17
  hidden_loss: delta_cosine
  lora:
    enabled: true
    r: 16
    alpha: 32
    dropout: 0.0
  v4_capture_micro_batch: 2
  v4_teacher_source: store
  v4_loop_order: layer_major
  v4_relay_every_cohorts: 3
  v4_teacher_residency: auto
  v4_stage_scoped: true
  v4_weight_residency: auto
  v4_min_train_gpu_util: 50.0
  v4_nccl_timeout_s: 1800
  v4_stage_splits: [8, 16, 23]
  v4_stage_devices: [0, 1, 2, 3]
  v4_optimizer: immediate_sgd
  lr: 3.0e-6
eval:
  every_epochs: 3
  recall_corpora: [machado, quijote_ch1, quijote_ch4]
  recite_lines: 20
  standard_damage_every_epochs: 3
  standard_damage_limit: 16
  standard_damage_batch_size: 4
  generation_batch: 4
