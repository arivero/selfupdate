# Campaign40 secondary confirmatory arm: gemma-4-26B-A4B-it PPP4, 40 epochs,
# Adam instead of SGD. This was the best-behaved of the 3 Adam arms in the
# train_sweep screen (damage improved rather than regressed at 12 epochs,
# alongside a ~10% recall cost vs the SGD arms) -- running it to full 40
# epochs settles whether that recall cost is transient or persists/grows.
# Same fixed recipe as the SGD primary arm otherwise (see
# gemma4_26b_v4_ppp4_e40_sgd.yaml), matching
# configs/experiments/train_sweep/train_sweep_26b_adam_lr3e7.yaml (HEAD
# f2178ac) extended from 12 to 40 epochs.
run_name: campaign40_g26b_adam
mask:
  compaction: flow_mask
cache:
  store_full_teacher_inputs: false
train:
  pipeline_version: 4
  pipeline_revision: "4.6"
  batching: bucketed
  micro_batch: 16
  epochs: 40
  seed: 17
  v4_teacher_source: store
  v4_loop_order: layer_major
  v4_relay_every_cohorts: 3
  v4_stage_scoped: true
  v4_weight_residency: auto
  v4_stage_splits: [8, 16, 23]
  v4_stage_devices: [0, 1, 2, 3]
  v4_optimizer: adam
  v4_adam_betas: [0.9, 0.999]
  lr: 3.0e-7
eval:
  every_epochs: 5
  recall_corpora: [machado, quijote_ch1, quijote_ch4]
  standard_damage_every_epochs: 5
