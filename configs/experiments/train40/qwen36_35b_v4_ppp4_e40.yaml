# Campaign40 primary arm: Qwen3.6-35B-A3B (MoE, 40L, 256 experts top-8)
# PPP4, 40 epochs. Same mechanics as the existing proven
# configs/experiments/h100_smoke/qwen36_35b_v4_ppp4_e40.yaml (already run
# once as runs/h100_g35b_v4_ppp4_e40, lr=1e-6, commit 95e4f18) EXCEPT
# lr: 3.0e-6 -- the train_sweep winning LR. New run_name (campaign40_*) so
# it does not collide with that existing reference run. micro_batch is
# left unset here (inherits 32 from base_qwen36_35b_v4_full.yaml, matching
# the existing e40/evalin configs which also leave it unset). Proven stage
# split: [10, 20, 30] over 4 devices.
run_name: campaign40_q35b
mask:
  compaction: flow_mask
cache:
  store_full_teacher_inputs: false
train:
  pipeline_version: 4
  pipeline_revision: "4.0"
  batching: bucketed
  epochs: 40
  seed: 17
  v4_teacher_source: store
  v4_loop_order: layer_major
  v4_relay_every_cohorts: 3
  v4_stage_scoped: true
  v4_weight_residency: auto
  v4_battery_mode: subprocess
  v4_stage_splits: [10, 20, 30]
  v4_stage_devices: [0, 1, 2, 3]
  v4_optimizer: immediate_sgd
  lr: 3.0e-6
eval:
  every_epochs: 5
  recall_corpora: [machado, quijote_ch1, quijote_ch4]
  standard_damage_every_epochs: 5
