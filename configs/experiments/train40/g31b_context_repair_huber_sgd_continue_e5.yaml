# Continue the one-epoch legal-A Huber diagnostic to the required 12,000-item
# evidence floor. The published e1 LoRA checkpoint is the explicit warm start;
# five further full-corpus epochs make six / 12,426 items in total.
run_name: campaign40_g31b_context_repair_huber_sgd_continue_e5
model:
  device: cuda:0
  pipeline_devices: [0]
  pipeline_splits: []
  pipeline_world_size: 1
train:
  init_from: campaign40_g31b_context_repair_huber_e1
  epochs: 5
  micro_batch: 1
  hidden_loss: huber
  v4_capture_micro_batch: 1
  v4_context_source: flow_censored_teacher
  v4_teacher_source: online
  v4_loop_order: item_major
  v4_teacher_residency: rebuild
  v4_stage_scoped: false
  v4_weight_residency: resident
  v4_stage: -1
  v4_stage_splits: []
  v4_stage_devices: []
  v4_relay_every_cohorts: 1
eval:
  every_epochs: 2
  standard_damage_every_epochs: 2
