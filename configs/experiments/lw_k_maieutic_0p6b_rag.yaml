# Maieutic v4 (additive budget): v2 + 141 dialogue-framed elicitation
# specs, champion recipe. Judged on (a) v2 recitation retention,
# (b) elicitation diversity (maieu-only eval, vs the v2 champion's).
run_name: lw_k_maieutic_0p6b_rag
data:
  examples_path: data/poem/examples_v4.jsonl
  paraphrase: true
  long_windows: [24, 48]
  part_chunk_lines: 48
  maieutic: true
train:
  method: layerwise
  schedule: summed
  epochs: 40
  lr: 1.0e-5
  hidden_loss: vocab_mse
  tail_ce_blocks: 4
  tail_ce_weight: 0.5
  lora:
    enabled: false
