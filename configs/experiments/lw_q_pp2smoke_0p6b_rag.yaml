# TARGET: pipeline-parallel smoke — 0.6B LoRA across 2 cards, 1 epoch.
run_name: lw_q_pp2smoke_0p6b_rag
model:
  pipeline_split: 14
data:
  examples_path: data/poem/examples_v4.jsonl
  paraphrase: true
  maieutic: true
train:
  method: layerwise
  schedule: summed
  epochs: 1
  lr: 1.0e-4
  hidden_loss: vocab_mse
  tail_ce_blocks: 8
  tail_ce_weight: 0.5
  anchor_kl_weight: 0.5
  anchor_path: data/anchors_es_v2.txt
  online_teacher: true
  lora:
    enabled: true
