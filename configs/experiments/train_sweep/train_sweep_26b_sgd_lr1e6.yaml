# gemma-4-26B PPP4 train_sweep control arm (owner goal 2026-07-20: LR x
# optimizer-momentum screen on ONE model before committing the expensive
# 40-epoch, all-5-model campaign). Same recipe as the proven complete
# h100_g26b_v4_ppp4_e40 run (all 41 epochs 0-40 clean), only epochs
# shortened to 12 and eval cadence to every 4 epochs so arms separate and
# finish quickly. This arm is the control/sanity-check: SGD lr=1e-6,
# identical optimizer knobs to the proven e40 baseline — it should behave
# like a shorter version of the known-good e40 run.
run_name: train_sweep_26b_sgd_lr1e6
mask:
  compaction: flow_mask
cache:
  store_full_teacher_inputs: false
train:
  pipeline_version: 4
  pipeline_revision: "4.0"
  batching: bucketed
  micro_batch: 16
  epochs: 12
  seed: 17
  v4_teacher_source: store
  v4_loop_order: layer_major
  v4_relay_every_cohorts: 3
  v4_stage_scoped: true
  v4_weight_residency: auto
  v4_battery_mode: subprocess
  v4_stage_splits: [8, 16, 23]
  v4_stage_devices: [0, 1, 2, 3]
  v4_optimizer: immediate_sgd
  lr: 1.0e-6
eval:
  every_epochs: 4
  recall_corpora: [machado, quijote_ch1, quijote_ch4]
  standard_damage_every_epochs: 4
