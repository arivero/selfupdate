# Machado (poem v4) — Mistral-Medium-3.5-128B at fp8 RELEASE width, agpuh02.
# The quantised-release training probe: LoRA + online teacher over the
# frozen fp8 base (device_map=auto, TP across 4 H100s). Dense model ->
# moe_mode stays dense_or_black_box. Knobs pinned (PP2 lesson).
run_name: mlt_mistralmed35_auto4_slide2_lora
model:
  name: mistralai/Mistral-Medium-3.5-128B
  device_map: auto
data:
  examples_path: data/poem/examples_v4.jsonl
  paraphrase: true
  maieutic: true
  long_windows:
  - 24
  - 48
  part_chunk_lines: 48
train:
  method: layerwise
  schedule: summed
  epochs: 40
  lr: 1.0e-04
  batching: padded
  micro_batch: 1
  grad_accum: 8
  hidden_loss: vocab_mse
  conn_window: 2
  conn_stride: 1
  readout_window_blocks: 2
  readout_weight: 0.5
  window_hidden_weight: 1.0
  readout_source: teacher_kl
  anchor_kl_weight: 0.5
  anchor_path: data/anchors_es_v2.txt
  moe_mode: dense_or_black_box
  online_teacher: true
  run_class: method
  lora:
    enabled: true
