# TARGET: completes the C2-16 anchor axis at 8B (was v1-anchors only).
run_name: lw_l_final_8b_av2_rag
model:
  name: Qwen/Qwen3-8B
data:
  examples_path: data/poem/examples_v4.jsonl
  paraphrase: true
  long_windows: [24, 48]
  part_chunk_lines: 48
  maieutic: true
train:
  method: layerwise
  schedule: summed
  epochs: 40
  lr: 1.0e-4
  hidden_loss: vocab_mse
  tail_ce_blocks: 8
  tail_ce_weight: 0.5
  anchor_kl_weight: 0.5
  anchor_path: data/anchors_es_v2.txt
  online_teacher: true
  lora:
    enabled: true
