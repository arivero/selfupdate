# SCALE-TRANSFER (mid 3): whole-think channel at 1.7B (0.6B: 0.077 CLEAN).
model:
  name: Qwen/Qwen3-1.7B
data:
  examples_path: data/poem/examples_think.jsonl
train:
  method: layerwise
  schedule: summed
  epochs: 40
  lr: 1.0e-5
  hidden_loss: vocab_mse
  tail_ce_blocks: 8
  tail_ce_weight: 0.5
  tail_ce_kind: task_label  # PINNED (defaults-are-variables; confound of 2026-07-05 struck twice)
  anchor_kl_weight: 0.5
  anchor_path: data/anchors_es_v2.txt
  frozen_teacher_copy: true
  lora:
    enabled: false
