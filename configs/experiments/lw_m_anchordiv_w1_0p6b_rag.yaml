# Anchor weight sweep: multi-genre anchors (v2) at weight 1.0.
# Question: does doubling the anchor pull cut intrusion below 10%, and at
# what recall cost?
run_name: lw_m_anchordiv_w1_0p6b_rag
data:
  examples_path: data/poem/examples_v4.jsonl
  paraphrase: true
  long_windows: [24, 48]
  part_chunk_lines: 48
  maieutic: true
train:
  method: layerwise
  schedule: summed
  epochs: 40
  lr: 1.0e-5
  hidden_loss: vocab_mse
  tail_ce_blocks: 8
  tail_ce_weight: 0.5
  anchor_kl_weight: 1.0
  anchor_path: data/anchors_es_v2.txt
  frozen_teacher_copy: true
  lora:
    enabled: false
