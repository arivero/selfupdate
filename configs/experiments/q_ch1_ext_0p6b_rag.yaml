# q_ch1 extension: warm-start from the 40-epoch checkpoint, +160 epochs
# (total 200 x 39 = 7.8k items). The 40-epoch run stored 75% of examples
# byte-perfect with failures spread across ALL families (cont/sect/maieu)
# — the under-training signature, not template lock. Question: does the
# failing tail close with budget, or is it a capacity wall at 0.6B?
run_name: q_ch1_ext_0p6b_rag
data:
  poem_path: data/quijote/raw_ch1.txt
  examples_path: data/quijote/examples_ch1.jsonl
  corpus_style: prose_quijote
  window: 6
  stride: 3
  full_lines: 6
  context_pad: 2
  section_max_lines: 6
  long_windows: []
  part_chunk_lines: 0
  paraphrase: true
  maieutic: true
train:
  method: layerwise
  schedule: summed
  epochs: 160
  lr: 1.0e-5
  hidden_loss: vocab_mse
  tail_ce_blocks: 8
  tail_ce_weight: 0.5
  anchor_kl_weight: 0.5
  frozen_teacher_copy: true
  init_from: q_ch1_0p6b_rag
  lora:
    enabled: false
