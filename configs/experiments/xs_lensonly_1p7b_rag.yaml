# SCALE-TRANSFER (bad 2): aux-100% control at 1.7B (0.6B: fails both jobs, +8.7).
model:
  name: Qwen/Qwen3-1.7B
data:
  examples_path: data/poem/examples_v4.jsonl
  paraphrase: true
  long_windows: [24, 48]
  part_chunk_lines: 48
  maieutic: true
train:
  method: layerwise
  schedule: summed
  epochs: 40
  lr: 1.0e-5
  hidden_loss: zero
  lens_ce_weight: 0.5
  lens_ce_from: 1
  frozen_teacher_copy: true
  lora:
    enabled: false
