# Wave I grid C: strict block-local control (no readout auxiliary) on v2
# data — does the nmse metric alone move free-run behavior?
run_name: lw_i_nmse_strict_0p6b_rag
data:
  examples_path: data/poem/examples_v2.jsonl
  paraphrase: true
  long_windows: [24, 48]
  part_chunk_lines: 48
train:
  method: layerwise
  schedule: summed
  epochs: 40
  lr: 1.0e-5
  hidden_loss: nmse
  lora:
    enabled: false
