# C2 scale ladder: final recipe (vocab_mse + v4 + tail-CE k8 + anchor-KL)
# at 4B, LoRA r16 online (adapters-off teacher — no cache, no frozen copy).
# C1 lesson: LoRA arms converge slower and are NOT inherently forgetting-
# proof — judge on the full battery, not the schedule name.
run_name: lw_l_final_4b_rag
model:
  name: Qwen/Qwen3-4B
data:
  examples_path: data/poem/examples_v4.jsonl
  paraphrase: true
  long_windows: [24, 48]
  part_chunk_lines: 48
  maieutic: true
train:
  method: layerwise
  schedule: summed
  epochs: 40
  lr: 1.0e-4
  hidden_loss: vocab_mse
  tail_ce_blocks: 8
  tail_ce_weight: 0.5
  anchor_kl_weight: 0.5
  online_teacher: true
  lora:
    enabled: true
