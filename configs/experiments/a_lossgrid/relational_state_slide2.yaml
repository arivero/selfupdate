run_name: a_lossgrid_1p7b_combined_slide2_relational_state
train:
  # Equal absolute NMSE + aligned-token cosine-Gram geometry. The absolute
  # half prevents the rotation-degenerate solution from fooling a frozen head.
  hidden_loss: relational_state
  conn_window: 2
  conn_stride: 1
  readout_window_blocks: 2
  readout_source: teacher_kl
eval:
  recall_corpora: [machado, quijote_ch1, quijote_ch4]
