# Small-MoE routing comparison (decide blackbox vs teacher_forced vs
# router_aligned BEFORE the 120B lanes — owner priority 2026-07-06).
# gpt-oss-20b, single card. All three arms are identical except moe_mode
# and seed, so the routing algorithm is the only moving part.
run_name: mlt_gptoss20b_slide2_tf_lora
model:
  name: openai/gpt-oss-20b
data:
  examples_path: data/poem/examples_v4.jsonl
  paraphrase: true
  maieutic: true
  long_windows:
  - 24
  - 48
  part_chunk_lines: 48
train:
  method: layerwise
  schedule: summed
  epochs: 40
  lr: 1.0e-04
  batching: padded
  micro_batch: 1
  grad_accum: 8
  hidden_loss: vocab_mse
  conn_window: 2
  conn_stride: 1
  readout_window_blocks: 2
  readout_weight: 0.5
  window_hidden_weight: 1.0
  readout_source: teacher_kl
  anchor_kl_weight: 0.5
  anchor_path: data/anchors_es_v2.txt
  seed: 17
  moe_mode: teacher_forced
  online_teacher: true
  run_class: method
  lora:
    enabled: true
