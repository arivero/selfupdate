# v5 ladder base — Qwen/Qwen3-0.6B. Recipe fixed across the style grid; arms pin
# {loss+slide, examples_path(scope), compaction} only. Generated by
# scripts/gen_v5_campaign.py — regenerate, don't hand-edit.
run_name: v5rs_0p6b_base_never_trained
model:
  name: Qwen/Qwen3-0.6B
data:
  examples_path: data/combined/examples_v5rs_window.jsonl
mask:
  mode: rag_system
  compaction: remove
train:
  method: layerwise
  run_class: method
  schedule: summed
  epochs: 6
  lr: 1.0e-5
  micro_batch: 8
  grad_accum: 8
  batching: bucketed
  hidden_loss: huber
  conn_window: 1
  conn_stride: 1
  readout_window_blocks: 1
  readout_weight: 0.5
  window_hidden_weight: 1.0
  readout_source: teacher_kl
  anchor_kl_weight: 0.5
  anchor_path: data/anchors_es_v2.txt
  frozen_teacher_copy: true
  lora:
    enabled: false
eval:
  every_epochs: 1
  recall_corpora: [machado, quijote_ch1, quijote_ch4]
  standard_damage_every_epochs: 1
  standard_damage_limit: 16
  standard_damage_batch_size: 8
  generation_batch: 8
