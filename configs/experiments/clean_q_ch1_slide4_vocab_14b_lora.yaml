run_name: clean_q_ch1_slide4_vocab_14b_lora
model:
  name: Qwen/Qwen3-14B
data:
  poem_path: data/quijote/raw_ch1.txt
  examples_path: data/quijote/examples_ch1.jsonl
  corpus_style: prose_quijote
  paraphrase: true
  maieutic: true
train:
  method: layerwise
  schedule: summed
  epochs: 320
  lr: 1.0e-04
  batching: padded
  micro_batch: 2
  hidden_loss: vocab_mse
  conn_window: 4
  conn_stride: 1
  readout_window_blocks: 4
  readout_weight: 0.5
  window_hidden_weight: 1.0
  readout_source: teacher_kl
  anchor_kl_weight: 0.5
  anchor_path: data/anchors_es_v2.txt
  online_teacher: true
  run_class: method
  lora:
    enabled: true
