# MIMICRY-LAW THEORY TEST: crowned recipe at 1.7B full-FT — hybrid twin had 27.5% intr;
# if the groove is in-window matching, the mimicry-free window fixes it.
run_name: lw_r_crown17_pinned
model:
  name: Qwen/Qwen3-1.7B
data:
  examples_path: data/poem/examples_v4.jsonl
  paraphrase: true
  long_windows: [24, 48]
  part_chunk_lines: 48
  maieutic: true
train:
  method: layerwise
  schedule: summed
  epochs: 40
  lr: 1.0e-5
  hidden_loss: vocab_mse
  conn_window: 8
  conn_stride: 1
  tail_ce_blocks: 8
  tail_ce_weight: 0.5
  tail_ce_kind: task_label  # PINNED (defaults-are-variables; confound of 2026-07-05 struck twice)
  tail_hidden_weight: 0.0
  anchor_kl_weight: 0.5
  anchor_path: data/anchors_es_v2.txt
  frozen_teacher_copy: true
  lora:
    enabled: false
