# SCALE-TRANSFER (bad 3): teacher-stream null-readout at 1.7B (0.6B: 0.877).
model:
  name: Qwen/Qwen3-1.7B
data:
  examples_path: data/poem/examples_v4.jsonl
  paraphrase: true
  long_windows: [24, 48]
  part_chunk_lines: 48
  maieutic: true
train:
  method: layerwise
  schedule: teacher_censored
  epochs: 40
  lr: 1.0e-5
  hidden_loss: vocab_mse
  frozen_teacher_copy: true
  lora:
    enabled: false
