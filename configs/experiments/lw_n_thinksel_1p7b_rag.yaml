# C2-12 scale replication: thinking_selective at 1.7B (own traces).
run_name: lw_n_thinksel_1p7b_rag
model:
  name: Qwen/Qwen3-1.7B
data:
  examples_path: data/poem/examples_think_sel_1p7b.jsonl
train:
  method: layerwise
  schedule: summed
  epochs: 40
  lr: 1.0e-5
  hidden_loss: vocab_mse
  tail_ce_blocks: 8
  tail_ce_weight: 0.5
  anchor_kl_weight: 0.5
  anchor_path: data/anchors_es_v2.txt
  frozen_teacher_copy: true
  lora:
    enabled: false
