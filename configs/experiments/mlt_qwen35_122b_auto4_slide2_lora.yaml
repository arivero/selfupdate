# Qwen3.5-122B-A10B — hybrid (36 GatedDeltaNet linear-attn + 12 full-attn)
# MoE, 256 experts top-8. BlockStack drives both attention types on the
# summed schedule (verified: forward + block-local backward through the
# linear layer). bf16 release width, device_map=auto across 4 cards.
run_name: mlt_qwen35_122b_auto4_slide2_lora
model:
  name: Qwen/Qwen3.5-122B-A10B
  device_map: auto
data:
  examples_path: data/poem/examples_v4.jsonl
  paraphrase: true
  maieutic: true
  long_windows:
  - 24
  - 48
  part_chunk_lines: 48
train:
  method: layerwise
  schedule: summed
  epochs: 40
  lr: 1.0e-04
  batching: padded
  micro_batch: 1
  grad_accum: 8
  hidden_loss: vocab_mse
  conn_window: 2
  conn_stride: 1
  readout_window_blocks: 2
  readout_weight: 0.5
  window_hidden_weight: 1.0
  readout_source: teacher_kl
  anchor_kl_weight: 0.5
  anchor_path: data/anchors_es_v2.txt
  moe_mode: dense_or_black_box
  online_teacher: true
  run_class: method
  lora:
    enabled: true
