# Machado (poem v4) MoE-mode lane on agpuh02 H100s — multigpu branch.
# Twin of mlt_gptoss120b_pp2_slide2_lora except the moe knobs below (pinned; PP2 lesson).
# 4-card auto (not pipeline_split=2): teacher_forced needs Mxfp4Config(dequantize=True)
# (moe.dequantize_overrides), which roughly doubles gpt-oss-120b's resident weight
# footprint vs the native MXFP4 blackbox reference. On 2 cards this hit 95-99% VRAM
# during weight load alone and crashed with a CUDA illegal-memory-access (multi-threaded
# tensor materialization racing near the memory ceiling) — see runs/pipeline_sched_agpuh02.log
# 2026-07-07 ~04:20. 4-card sharding gives the dequantized weights real headroom.
run_name: mlt_gptoss120b_auto4_slide2_tf_lora
model:
  name: openai/gpt-oss-120b
  device_map: auto
data:
  examples_path: data/poem/examples_v4.jsonl
  paraphrase: true
  maieutic: true
  long_windows:
  - 24
  - 48
  part_chunk_lines: 48
train:
  method: layerwise
  schedule: summed
  epochs: 40
  lr: 1.0e-04
  batching: padded
  micro_batch: 1
  grad_accum: 8
  hidden_loss: vocab_mse
  conn_window: 2
  conn_stride: 1
  readout_window_blocks: 2
  readout_weight: 0.5
  window_hidden_weight: 1.0
  readout_source: teacher_kl
  anchor_kl_weight: 0.5
  anchor_path: data/anchors_es_v2.txt
  moe_mode: teacher_forced
  online_teacher: true
  run_class: method
  lora:
    enabled: true
