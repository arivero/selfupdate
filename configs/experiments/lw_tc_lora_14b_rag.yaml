# the lw program at scale: teacher_censored (the schedule with zero
# cross-block communication, i.e. the personalization-during-forward
# candidate) at 14B. Localization question: does the per-layer increment
# peak (layer ~7 of 28 at 0.6B) sit at a fixed depth or a fixed FRACTION?
run_name: lw_tc_lora_14b_rag
model:
  name: Qwen/Qwen3-14B
train:
  method: layerwise
  schedule: teacher_censored
  epochs: 20
  lr: 1.0e-4
  online_teacher: true
  lora:
    enabled: true
