# teacher_kl rerun of the C2-12 headline arm: zero task labels in any
# gradient. If it matches thinksel (0.037 CLEAN), the gentle-channel
# claim survives purification.
run_name: lw_n_thinkselkl_0p6b_rag
data:
  examples_path: data/poem/examples_think_sel.jsonl
train:
  method: layerwise
  schedule: summed
  epochs: 40
  lr: 1.0e-5
  hidden_loss: vocab_mse
  tail_ce_blocks: 8
  tail_ce_weight: 0.5
  anchor_kl_weight: 0.5
  anchor_path: data/anchors_es_v2.txt
  frozen_teacher_copy: true
  tail_ce_kind: teacher_kl
  lora:
    enabled: false
