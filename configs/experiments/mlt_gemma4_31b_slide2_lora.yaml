run_name: mlt_gemma4_31b_slide2_lora
model:
  name: google/gemma-4-31B-it
  pipeline_split: 30
data:
  examples_path: data/poem/examples_v4.jsonl
  paraphrase: true
  long_windows: [24, 48]
  part_chunk_lines: 48
  maieutic: true
train:
  method: layerwise
  schedule: summed
  epochs: 40
  lr: 1.0e-04
  batching: padded
  micro_batch: 1
  grad_accum: 8
  hidden_loss: vocab_mse
  conn_window: 2
  conn_stride: 1
  readout_window_blocks: 2
  readout_weight: 0.5
  window_hidden_weight: 1.0
  readout_source: teacher_kl
  anchor_kl_weight: 0.5
  anchor_path: data/anchors_es_v2.txt
  online_teacher: true
  run_class: method
  lora:
    enabled: true
