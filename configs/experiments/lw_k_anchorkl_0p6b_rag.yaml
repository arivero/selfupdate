# anchor-KL arm: champion recipe + KL(base||student) on neighbor fragments
# through the tail window (the corrected anchor after the CE negative).
run_name: lw_k_anchorkl_0p6b_rag
data:
  examples_path: data/poem/examples_v2.jsonl
  paraphrase: true
  long_windows: [24, 48]
  part_chunk_lines: 48
train:
  method: layerwise
  schedule: summed
  epochs: 40
  lr: 1.0e-5
  hidden_loss: vocab_mse
  tail_ce_blocks: 4
  tail_ce_weight: 0.5
  anchor_kl_weight: 0.5
  frozen_teacher_copy: true
  lora:
    enabled: false
