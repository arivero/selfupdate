# Co-residence arm (stretch #1): Machado v4 + Quijote ch1 in ONE corpus.
# Does the poem survive sharing the readout window with prose? Evaluated
# separately per corpus (eval_combined_v4 / eval_combined_ch1 configs).
# Multi-genre anchors (the C2-2 finding applies from the start).
run_name: lw_m_combined_0p6b_rag
data:
  examples_path: data/combined/examples_v4_ch1.jsonl
  paraphrase: true
  maieutic: true
train:
  method: layerwise
  schedule: summed
  epochs: 40
  lr: 1.0e-5
  hidden_loss: vocab_mse
  tail_ce_blocks: 8
  tail_ce_weight: 0.5
  anchor_kl_weight: 0.5
  anchor_path: data/anchors_es_v2.txt
  frozen_teacher_copy: true
  lora:
    enabled: false
