# Data axis: champion recipe on v3 (v2 + catechism drills: follow/precede/
# cloze/section anchors — synthetic content). 14 epochs x 957 examples
# = 13,398 items, matched to the v2 champion budget (13,320).
run_name: lw_j_vocab_v3_0p6b_rag
data:
  examples_path: data/poem/examples_v3.jsonl
  paraphrase: true
  long_windows: [24, 48]
  part_chunk_lines: 48
  catechism: true
train:
  method: layerwise
  schedule: summed
  epochs: 14
  lr: 1.0e-5
  hidden_loss: vocab_mse
  tail_ce_blocks: 4
  tail_ce_weight: 0.5
  lora:
    enabled: false
