# PP2 BISECTION arm A: LoRA + online teacher, PP2. Twin = same minus split.
run_name: pp2diag_lora_0p6b
model:
  pipeline_split: 14
data:
  examples_path: data/poem/examples_v4.jsonl
train:
  method: layerwise
  schedule: summed
  epochs: 20
  lr: 1.0e-4
  hidden_loss: vocab_mse
  conn_window: 8
  conn_stride: 1
  tail_ce_blocks: 8
  tail_ce_weight: 0.5
  tail_hidden_weight: 0.0
  online_teacher: true
  lora:
    enabled: true
