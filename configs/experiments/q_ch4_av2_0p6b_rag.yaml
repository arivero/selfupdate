# C2 saturation ladder rung: Quijote Part I chapters 1..4, final recipe.
# Rungs below the 12k-item floor are capacity probes, not loss comparisons.
run_name: q_ch4_av2_0p6b_rag
data:
  poem_path: data/quijote/raw_ch4.txt
  examples_path: data/quijote/examples_ch4.jsonl
  corpus_style: prose_quijote
  window: 6
  stride: 3
  full_lines: 6
  context_pad: 2
  section_max_lines: 6
  long_windows: []
  part_chunk_lines: 0
  paraphrase: true
  maieutic: true
train:
  method: layerwise
  schedule: summed
  epochs: 40
  lr: 1.0e-5
  hidden_loss: vocab_mse
  tail_ce_blocks: 8
  tail_ce_weight: 0.5
  anchor_kl_weight: 0.5
  anchor_path: data/anchors_es_v2.txt
  frozen_teacher_copy: true
  lora:
    enabled: false
