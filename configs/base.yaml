run_name: dev
layerwise_project_version: "3.4"
model:
  name: Qwen/Qwen3-0.6B
  dtype: bfloat16
  device: cuda
data:
  poem_path: data/poem/raw.txt
  examples_path: data/poem/examples.jsonl
  window: 12
  stride: 4
  include_full: true
  full_lines: 24
  context_pad: 4
mask:
  mode: rag
  compaction: flow_mask
cache:
  root: caches
  shard_size: 128
  store_full_teacher_inputs: true
train:
  pipeline_version: 4
  pipeline_revision: "4.6"
  method: layerwise
  lr: 1.0e-5
  epochs: 10
  micro_batch: 1
  batching: bucketed
  seed: 17
eval:
  recite_lines: 20
  every_epochs: 2
